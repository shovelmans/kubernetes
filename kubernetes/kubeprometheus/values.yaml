grafana:
  service:
    type: ClusterIP   # 👈 ya no necesitas NodePort con ingress
  persistence:
    enabled: true
    type: pvc
    existingClaim: grafana-pvc

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      kubernetes.io/ingress.class: nginx
    hosts:
      - grafana.jorge.local
    tls: []

prometheus:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      kubernetes.io/ingress.class: nginx
    hosts:
      - prometheus.jorge.local
    tls: []
