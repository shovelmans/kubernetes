apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shovelmans/kubernetes.git   # tu repo Git
    targetRevision: main
    path: kubernetes/kubeprometheus                        # carpeta donde están Application.yaml y values.yaml
    helm:
      releaseName: kube-prometheus-stack
      skipCrds: true
      valueFiles:
        - values.yaml                                      # ArgoCD usará este values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
