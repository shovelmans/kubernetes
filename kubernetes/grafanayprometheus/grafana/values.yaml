adminUser: admin
adminPassword: admin  # cámbialo después en un Secret

service:
  type: ClusterIP
  port: 3000

persistence:
  enabled: true
  size: 5Gi

grafana.ini:
  paths:
    data: /var/lib/grafana
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning

datasources:
  enabled: true
  defaultDatasourceEnabled: true
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
