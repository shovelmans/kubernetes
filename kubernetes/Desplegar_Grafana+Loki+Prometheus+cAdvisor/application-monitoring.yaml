apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitorizacion
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shovelmans/kubernetes.git   # 👈 tu repo
    targetRevision: main                                   # 👈 branch
    path: kubernetes/Desplegar_Grafana+Loki+Prometheus+cAdvisor  # 👈 carpeta con manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
